# yaml-language-server: $schema=https://vdl.varavel.com/schemas/v0/config.schema.json

version: 1

targets:
  - go:
      schema: ./schemas/ir.vdl
      output: ./toolchain/internal/core/ir/irtypes
      clean: true
      package: irtypes

  - go:
      schema: ./schemas/plugin.vdl
      output: ./toolchain/internal/codegen/plugintypes
      clean: true
      package: plugintypes

  - go:
      schema: ./schemas/config_file.vdl
      output: ./toolchain/internal/codegen/configtypes
      clean: true
      package: configtypes

  - go:
      schema: ./schemas/lock_file.vdl
      output: ./toolchain/internal/codegen/locktypes
      clean: true
      package: locktypes
