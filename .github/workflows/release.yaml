name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    if: "!contains(github.event.release.tag_name, 'vscode')"
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Run release script
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: /bin/bash -c "task release"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.txt

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: "!contains(github.event.release.tag_name, 'vscode')"
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          cd ./installers/npm

          VERSION=${{ github.event.release.tag_name }}
          echo "Publishing version: $VERSION"

          # Update package.json version (this automatically removes v prefix)
          npm version $VERSION --no-git-tag-version --allow-same-version

          if [[ "$VERSION" == *"-"* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          echo "Using npm tag: $NPM_TAG"

          npm publish --provenance --access public --tag $NPM_TAG

  publish-homebrew:
    name: Publish to Homebrew Tap
    runs-on: ubuntu-latest
    needs: build-and-upload
    if: "!contains(github.event.release.tag_name, 'vscode')"
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate Homebrew Formulas
        run: go run -C ./installers/brew main.go ${{ github.event.release.tag_name }}

      - name: Update Homebrew Tap
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Setup identity
          git config --global user.name "Varavel Release Bot"
          git config --global user.email "release-bot@varavel.com"

          # Clone the varavelio/homebrew-tap repository
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/varavelio/homebrew-tap.git temp-tap

          # Copy the generated Homebrew Formulas
          mkdir -p ./temp-tap/Formula
          rsync -rv ./installers/brew/Formula/ ./temp-tap/Formula/

          # Commit and push
          cd ./temp-tap
          git add .
          if git diff --staged --quiet; then
            echo "No changes detected in Formula directory"
          else
            git commit -m "chore: update vdl to ${{ github.event.release.tag_name }}"
            git push origin main
          fi

  build-and-push-docker-images:
    name: Build and push ${{ matrix.vars.platform }}
    runs-on: ${{ matrix.vars.os }}
    needs: build-and-upload
    if: "!contains(github.event.release.tag_name, 'vscode')"
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    strategy:
      matrix:
        vars:
          - { os: ubuntu-24.04, platform: amd64 }
          - { os: ubuntu-24.04-arm, platform: arm64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Strip "v" prefix from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "CLEAN_TAG=${TAG#v}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: >
          docker build
          --tag varavel/vdl:${{ env.CLEAN_TAG }}-${{ matrix.vars.platform }}
          --tag ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-${{ matrix.vars.platform }}
          --build-arg VDL_VERSION=${{ env.CLEAN_TAG }}
          --file ./docker/Dockerfile .

      - name: Push the Docker images
        run: |
          docker push varavel/vdl:${{ env.CLEAN_TAG }}-${{ matrix.vars.platform }}
          docker push ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-${{ matrix.vars.platform }}

  merge-and-push-docker-manifest:
    name: Merge and push manifest
    runs-on: ubuntu-latest
    needs: build-and-push-docker-images
    if: "!contains(github.event.release.tag_name, 'vscode')"
    permissions:
      contents: read
      packages: write
    timeout-minutes: 10

    steps:
      - name: Strip "v" prefix from tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "CLEAN_TAG=${TAG#v}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and push manifests
        run: |
          docker manifest create varavel/vdl:${{ env.CLEAN_TAG }} \
            --amend varavel/vdl:${{ env.CLEAN_TAG }}-amd64 \
            --amend varavel/vdl:${{ env.CLEAN_TAG }}-arm64
          docker manifest push varavel/vdl:${{ env.CLEAN_TAG }}

          docker manifest create varavel/vdl:latest \
            --amend varavel/vdl:${{ env.CLEAN_TAG }}-amd64 \
            --amend varavel/vdl:${{ env.CLEAN_TAG }}-arm64
          docker manifest push varavel/vdl:latest

          docker manifest create ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }} \
            --amend ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-amd64 \
            --amend ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-arm64
          docker manifest push ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}

          docker manifest create ghcr.io/varavelio/vdl:latest \
            --amend ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-amd64 \
            --amend ghcr.io/varavelio/vdl:${{ env.CLEAN_TAG }}-arm64
          docker manifest push ghcr.io/varavelio/vdl:latest
