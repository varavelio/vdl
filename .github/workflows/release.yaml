name: Release

on:
  release:
    types: [published]

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.vars.outputs.should_run }}
      tag: ${{ steps.vars.outputs.tag }}
      clean_tag: ${{ steps.vars.outputs.clean_tag }}
    steps:
      - id: vars
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "should_run=${{ !contains(github.event.release.tag_name, 'vscode') }}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_tag=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_run == 'true'
    permissions:
      contents: write
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Run release script
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: /bin/bash -c "task release"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/*.txt

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [setup, build-and-upload]
    if: needs.setup.outputs.should_run == 'true'
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10
    env:
      TAG: ${{ needs.setup.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          cd ./integrations/installers/npm

          echo "Publishing version: $TAG"

          # Update package.json version
          npm version $TAG --no-git-tag-version --allow-same-version

          if [[ "$TAG" == *"-"* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          echo "Using npm tag: $NPM_TAG"

          npm publish --provenance --access public --tag $NPM_TAG

  publish-homebrew:
    name: Publish to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [setup, build-and-upload]
    if: needs.setup.outputs.should_run == 'true'
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      TAG: ${{ needs.setup.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Generate Homebrew Formulas
        run: go run -C ./integrations/installers/brew main.go $TAG

      - name: Update Homebrew Tap
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Setup identity
          git config --global user.name "Varavel Release Bot"
          git config --global user.email "release-bot@varavel.com"

          # Clone the varavelio/homebrew-tap repository
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/varavelio/homebrew-tap.git temp-tap

          # Copy the generated Homebrew Formulas
          mkdir -p ./temp-tap/Formula
          rsync -rv ./integrations/installers/brew/Formula/ ./temp-tap/Formula/

          # Commit and push
          cd ./temp-tap
          git add .
          if git diff --staged --quiet; then
            echo "No changes detected in Formula directory"
          else
            git commit -m "chore: update vdl to $TAG"
            git push origin main
          fi

  build-and-push-images:
    name: Build and push ${{ matrix.vars.platform }}
    runs-on: ${{ matrix.vars.os }}
    needs: [setup, build-and-upload]
    if: needs.setup.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    strategy:
      matrix:
        vars:
          - { os: ubuntu-24.04, platform: amd64 }
          - { os: ubuntu-24.04-arm, platform: arm64 }
    env:
      CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}
      PLATFORM: ${{ matrix.vars.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: >
          docker build
          --tag varavel/vdl:${CLEAN_TAG}-${PLATFORM}
          --tag ghcr.io/varavelio/vdl:${CLEAN_TAG}-${PLATFORM}
          --build-arg VDL_VERSION=${CLEAN_TAG}
          --file ./integrations/installers/docker/Dockerfile .

      - name: Push the Docker images
        run: |
          docker push varavel/vdl:${CLEAN_TAG}-${PLATFORM}
          docker push ghcr.io/varavelio/vdl:${CLEAN_TAG}-${PLATFORM}

  merge-and-push-manifest:
    name: Merge and push manifest
    runs-on: ubuntu-latest
    needs: [setup, build-and-push-images]
    if: needs.setup.outputs.should_run == 'true'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 10
    env:
      CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and push manifests
        run: |
          docker manifest create varavel/vdl:${CLEAN_TAG} \
            --amend varavel/vdl:${CLEAN_TAG}-amd64 \
            --amend varavel/vdl:${CLEAN_TAG}-arm64
          docker manifest push varavel/vdl:${CLEAN_TAG}

          docker manifest create varavel/vdl:latest \
            --amend varavel/vdl:${CLEAN_TAG}-amd64 \
            --amend varavel/vdl:${CLEAN_TAG}-arm64
          docker manifest push varavel/vdl:latest

          docker manifest create ghcr.io/varavelio/vdl:${CLEAN_TAG} \
            --amend ghcr.io/varavelio/vdl:${CLEAN_TAG}-amd64 \
            --amend ghcr.io/varavelio/vdl:${CLEAN_TAG}-arm64
          docker manifest push ghcr.io/varavelio/vdl:${CLEAN_TAG}

          docker manifest create ghcr.io/varavelio/vdl:latest \
            --amend ghcr.io/varavelio/vdl:${CLEAN_TAG}-amd64 \
            --amend ghcr.io/varavelio/vdl:${CLEAN_TAG}-arm64
          docker manifest push ghcr.io/varavelio/vdl:latest
