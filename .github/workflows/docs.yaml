name: Publish Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Build documentation
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: /bin/bash -c "task docs"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Cleanup node_modules to prevent permission issues (because of the devcontainer)
          sudo rm -rf node_modules

          # Deploy to Cloudflare Pages
          OUTPUT=$(npx wrangler pages deploy ./site \
            --project-name=varavel-vdl \
            --branch="${{ github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message }}")

          # Extract the deployment URL from the output
          URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.pages\.dev' | head -n 1)

          # Append the deployment URL to the GitHub Actions summary
          if [ -n "$URL" ]; then
            echo "### 🚀 Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
            echo "Preview: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
            echo "::notice title=Deployment URL::$URL"
          else
            echo "Deployment URL not found."
            exit 1
          fi
