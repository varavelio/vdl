name: Publish Docs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Build & Deploy
        uses: devcontainers/ci@v0.3
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_HASH: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          push: never
        runCmd: |
          /bin/bash -c '
            set -e

            # Build docs
            task docs

            # Deploy to Cloudflare Pages
            DEPLOY_OUT=$(npx wrangler pages deploy ./site \
              --project-name=varavel-vdl \
              --branch="$BRANCH_NAME" \
              --commit-hash="$COMMIT_HASH" \
              --commit-message="$COMMIT_MESSAGE")

            # Extract the deployment URL from the output
            URL=$(echo "$DEPLOY_OUT" | grep -o "https://[^ ]*\.pages\.dev" | head -n 1)
            if [ -n "$URL" ]; then
              echo "### 🚀 Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
              echo "Preview: [$URL]($URL)" >> $GITHUB_STEP_SUMMARY
              echo "::notice title=Deployment URL::$URL"
            else
              echo "Deployment URL not found."
              exit 1
            fi
          '
