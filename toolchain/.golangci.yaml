version: "2"

linters:
  default: none
  enable:
    - govet
    - errcheck
    - ineffassign
    - staticcheck
    - unused
    - modernize
    - bodyclose
    - godoclint
    - godot
    - errorlint
    - nilerr
    - nilnesserr
    - durationcheck
    - makezero
    - noctx
    - nolintlint
  settings:
    modernize:
      disable:
        # VDL generates vdl.Ptr() helpers
        - newexpr
    nolintlint:
      # Enable to require an explanation of nonzero length after each nolint directive.
      require-explanation: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofumpt
    - goimports
    - golines
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
